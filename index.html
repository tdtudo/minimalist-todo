<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的待办清单</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="window-header">
        <div class="window-controls">
            <button class="control-btn close" id="close-btn"></button>
            <button class="control-btn minimize" id="minimize-btn"></button>
            <button class="control-btn pin" id="pin-btn" title="固定到桌面"></button>
        </div>
        <div class="header-right">
            <button id="lang-toggle" title="切换语言">中/EN</button>
            <button id="add-toggle" title="添加任务">+</button>
        </div>
    </div>
    
    <div class="container">
        <ul id="todo-list"></ul>
    </div>
    
    <div class="input-overlay" id="input-overlay">
        <input type="text" id="todo-input" placeholder="输入新任务...">
        <button id="add-btn">添加</button>
    </div>
    
    <script src="i18n.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
